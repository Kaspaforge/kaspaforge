# Kaspa Safe — Android APK (Tauri 2).
# Builds an UNSIGNED release APK from app/ + web/ (assets bundled — the app works offline).
# Release signing happens OFF-CI, on the OfficeForge server, with a key that never leaves it;
# the smoke job below signs a THROWAWAY debug copy only to be able to install it on the emulator.
# Staged into .github/workflows/android-apk.yml by publish-recovery-repo.sh.
name: android-apk

on:
  push:
    paths: ['app/**', 'web/**', '.github/workflows/android-apk.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - uses: android-actions/setup-android@v3

      - name: Install Android platform + NDK
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Frontend deps (tauri CLI via npm)
        working-directory: app
        run: npm install

      - name: Stage web assets into the app bundle
        run: |
          rm -rf app/web
          cp -r web app/web

      - name: Init Android project + icons
        working-directory: app
        run: |
          npx tauri android init
          npx tauri icon app-icon.png

      # edge-to-edge fix: the default Tauri MainActivity does not handle insets —
      # the header slides under the status bar (see android-patches/MainActivity.kt)
      - name: Patch generated MainActivity (safe-area insets)
        working-directory: app
        run: |
          GEN=$(find src-tauri/gen/android -name MainActivity.kt -path "*kaspasafe*" | head -1)
          [ -n "$GEN" ] || { echo "::error::generated MainActivity.kt not found"; exit 1; }
          cp android-patches/MainActivity.kt "$GEN"
          echo "patched: $GEN"

      - name: Build unsigned release APK
        working-directory: app
        run: |
          npx tauri android build --apk
          APK=$(find src-tauri/gen/android -path "*/outputs/apk/*" -name "*release-unsigned.apk" | head -1)
          [ -n "$APK" ] || { echo "::error::unsigned APK not found"; find src-tauri/gen/android -name "*.apk"; exit 1; }
          mkdir -p ../out && cp "$APK" ../out/KaspaSafe-unsigned.apk
          sha256sum ../out/KaspaSafe-unsigned.apk

      # debug build ONLY for the emulator smoke test: debuggable → the WebView JS console shows up
      # in logcat (Chromium does not log it for release), and gradle signs with the debug key itself
      - name: Build debug APK (for emulator smoke)
        working-directory: app
        run: |
          npx tauri android build --apk --debug
          DAPK=$(find src-tauri/gen/android -path "*/outputs/apk/*" -name "*debug.apk" | head -1)
          [ -n "$DAPK" ] || { echo "::error::debug APK not found"; exit 1; }
          cp "$DAPK" ../out/KaspaSafe-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: KaspaSafe-android-unsigned
          path: out/KaspaSafe-unsigned.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: KaspaSafe-android-debug
          path: out/KaspaSafe-debug.apk
          if-no-files-found: error

  # Smoke test of the WASM core in a real Android WebView: install the APK on an emulator and
  # wait for the `[ksafe-core] ok` marker in logcat (printed by app.js after wasm init + gen_keys).
  smoke-emulator:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with: { name: KaspaSafe-android-debug }

      - name: Stage APK
        run: cp KaspaSafe-debug.apk /tmp/smoke.apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run WASM smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          # NB: emulator-runner executes EACH line as a separate sh -c — one-liners only
          script: |
            adb install /tmp/smoke.apk
            adb logcat -c
            adb shell am start -n co.officeforge.kaspasafe/.MainActivity
            sleep 40
            adb logcat -d > /tmp/logcat.txt
            grep -iE "console|chromium" /tmp/logcat.txt | tail -40
            sh -c 'grep -qF "[ksafe-core] ok" /tmp/logcat.txt && echo "WASM CORE OK in Android WebView" || (echo "::error::no [ksafe-core] ok marker in logcat" && exit 1)'

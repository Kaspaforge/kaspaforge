name: remove-stale-apk

on:
  push:
    paths: ['.github/workflows/remove-stale-apk.yml']

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Remove retired APK releases, tags and artifacts
        shell: bash
        run: |
          set -euo pipefail

          gh api --paginate "repos/$GH_REPO/releases?per_page=100" \
            --jq '.[] | select(.tag_name | startswith("apk-v")) | .id' |
          while read -r id; do
            [ -n "$id" ] && gh api -X DELETE "repos/$GH_REPO/releases/$id"
          done

          gh api "repos/$GH_REPO/git/matching-refs/tags/apk-v" \
            --jq '.[].ref' |
          while read -r ref; do
            [ -n "$ref" ] && gh api -X DELETE "repos/$GH_REPO/git/refs/${ref#refs/}"
          done

          gh api --paginate "repos/$GH_REPO/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name | startswith("KaspaSafe-android-")) | .id' |
          while read -r id; do
            [ -n "$id" ] && gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$id"
          done

          gh api --paginate "repos/$GH_REPO/actions/runs?status=in_progress&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "android-apk") | .id' |
          while read -r id; do
            [ -n "$id" ] && gh api -X POST "repos/$GH_REPO/actions/runs/$id/cancel" || true
          done

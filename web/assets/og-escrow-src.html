<!doctype html>
<!-- Source of the escrow OG card (1200×630). Render: screenshot the 1200×630 viewport → assets/og-escrow.png -->
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Golos+Text:wght@500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #0E1116; overflow: hidden;
    font-family: "Golos Text", sans-serif; color: #ECEFF4; position: relative; }
  .glow { position: absolute; width: 900px; height: 900px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,193,175,.14), transparent 60%);
    right: -260px; top: -260px; }
  .in { position: relative; padding: 64px 72px; height: 100%; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand-name { font-family: Oswald, sans-serif; font-weight: 600; font-size: 30px;
    letter-spacing: .06em; text-transform: uppercase; }
  .brand-name b { color: #00C1AF; }
  h1 { font-family: Oswald, sans-serif; font-weight: 700; font-size: 76px; line-height: 1.08;
    text-transform: uppercase; letter-spacing: .01em; margin-top: 56px; max-width: 800px; }
  h1 em { font-style: normal; color: #00C1AF; }
  .sub { margin-top: 28px; font-size: 27px; color: #9AA7BC; max-width: 720px; line-height: 1.4; }
  .foot { margin-top: auto; display: flex; align-items: baseline; gap: 26px;
    font-family: "JetBrains Mono", monospace; font-size: 21px; color: #6c7a90; }
  .foot .url { color: #00C1AF; font-weight: 700; }
  .cov { position: absolute; right: 56px; top: 150px; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="in">
  <div class="brand">
    <svg width="52" height="52" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#00C1AF" stroke-width="6"/><path d="M58 30 v40 M36 32 L54 50 L36 68" fill="none" stroke="#00C1AF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="brand-name">Kaspa <b>Escrow</b></span>
  </div>
  <h1>An escrow that<br><em>physically can't</em> steal</h1>
  <div class="sub">The money sits in an on-chain covenant. Even the arbiter can only rule: buyer, seller, or a split.</div>
  <div class="foot"><span class="url">kaspaforge.org</span><span>non-custodial · Kaspa mainnet</span></div>
</div>
<svg class="cov" width="330" height="300" viewBox="0 0 430 300">
  <rect x="130" y="110" width="170" height="80" rx="10" fill="#1B222C" stroke="rgba(0,193,175,.45)" stroke-width="2"/>
  <text x="215" y="147" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="21" fill="#ECEFF4">250 KAS</text>
  <text x="215" y="170" text-anchor="middle" font-family="JetBrains Mono" font-size="11" letter-spacing="1.5" fill="#6c7a90">IN ESCROW</text>
  <path d="M130 135 C 80 130, 60 90, 48 62" stroke="#00C1AF" stroke-width="2.5" fill="none" stroke-dasharray="6 6"/>
  <text x="14" y="42" font-family="Golos Text" font-weight="600" font-size="15" fill="#ECEFF4">Buyer</text>
  <path d="M300 135 C 350 130, 370 90, 382 62" stroke="#00C1AF" stroke-width="2.5" fill="none" stroke-dasharray="6 6"/>
  <text x="352" y="42" font-family="Golos Text" font-weight="600" font-size="15" fill="#ECEFF4">Seller</text>
  <path d="M215 190 L 215 242" stroke="#E63A0B" stroke-width="2.5"/>
  <line x1="202" y1="218" x2="228" y2="244" stroke="#E63A0B" stroke-width="3"/>
  <line x1="228" y1="218" x2="202" y2="244" stroke="#E63A0B" stroke-width="3"/>
  <text x="215" y="270" text-anchor="middle" font-family="Golos Text" font-weight="700" font-size="14" fill="#ff8a70">anyone else</text>
</svg>
</body>
</html>

<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;background:#0E1116;position:relative;overflow:hidden;
    font-family:'Oswald',sans-serif;display:flex;align-items:center;padding:0 84px}
  .glow{position:absolute;right:-160px;top:-160px;width:640px;height:640px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,193,175,.16),transparent 65%)}
  h1{font-size:86px;line-height:1.08;color:#E8EDEC;text-transform:uppercase;letter-spacing:.01em;max-width:740px}
  h1 b{color:#00C1AF}
  .k{position:absolute;right:84px;top:50%;transform:translateY(-50%)}
  .sub{position:absolute;left:84px;bottom:56px;font-family:'JetBrains Mono',monospace;font-size:21px;
    letter-spacing:.12em;text-transform:uppercase;color:#8FA09D}
  .sub b{color:#00C1AF;font-weight:500}
</style></head><body>
<div class="glow"></div>
<h1>A stolen key isn't <b>stolen coins</b> yet</h1>
<svg class="k" width="230" height="230" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="46" fill="none" stroke="#00C1AF" stroke-width="6"/>
  <path d="M58 30 v40 M36 32 L54 50 L36 68" fill="none" stroke="#00C1AF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<div class="sub">Kaspa <b>Safe</b> · non-custodial vault with a cancel window · kaspaforge.org</div>
</body></html>

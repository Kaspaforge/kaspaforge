<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Escrow deal — Kaspa Escrow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Golos+Text:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0E1116">
<link rel="manifest" href="/manifest-escrow.json">
<link rel="apple-touch-icon" href="/assets/icons-escrow/apple-touch-icon.png">
<script src="/assets/nav.js?v=5" defer></script>
<link rel="stylesheet" href="/assets/safe.css?v=14">
<link rel="stylesheet" href="/assets/escrow.css?v=7">
<script src="/assets/qrcode.min.js"></script>
</head>
<body>
<div class="wrap">

<header class="top">
  <a class="brand" href="/">
    <img class="brand-k" src="/assets/brand/emblem-flat-header.png" alt="">
    <span class="brand-name">Kaspa <b>Escrow</b></span>
  </a>
  <nav><a href="/escrow.html">New deal</a></nav>
</header>

<div style="max-width:820px;margin:36px auto 0">
  <div class="eyebrow">Escrow deal</div>
  <h1 style="font-size:clamp(26px,4vw,38px);margin:10px 0 18px" id="title">Deal</h1>
  <div id="err" class="note alarm" style="display:none" role="alert"></div>
  <div id="empty" class="plate" style="display:none"><p class="hint" id="empty-msg"></p><div style="margin-top:12px"><a class="btn btn-kaspa" href="/escrow.html" id="empty-new">New deal</a></div></div>

  <!-- Loading a deal on a new device/browser: the recovery sheet (.txt) or manual entry -->
  <div class="plate" id="load-plate" style="display:none">
    <h2 style="font-size:20px" id="ld-head"></h2>
    <p class="hint" id="ld-hint"></p>
    <button class="btn btn-ghost" id="ld-sheet" type="button"></button>
    <input type="file" id="ld-file" accept=".txt,text/plain" style="display:none">
    <p class="hint" id="ld-or" style="margin:16px 0 6px"></p>
    <label id="ld-id-lbl"></label>
    <input type="number" id="ld-id" inputmode="numeric" min="1" autocomplete="off">
    <label id="ld-key-lbl"></label>
    <input type="password" id="ld-key" autocomplete="off" spellcheck="false">
    <label id="ld-token-lbl"></label>
    <input type="password" id="ld-token" autocomplete="off" spellcheck="false">
    <label id="ld-chat-lbl"></label>
    <input type="password" id="ld-chat" autocomplete="off" spellcheck="false">
    <div style="margin-top:14px"><button class="btn btn-kaspa" id="ld-open"></button></div>
  </div>

  <!-- Portfolio: all deals saved in this browser (by analogy with the safe portfolio) -->
  <div class="plate" id="deals-bar" style="display:none;padding:16px 18px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap">
      <h2 style="font-size:17px;margin:0" id="db-title">My deals</h2>
    </div>
    <div id="db-list"></div>
    <div style="margin-top:12px"><a class="btn btn-ghost" id="db-add" href="/escrow.html"></a></div>
  </div>

  <!-- JOIN: the second party reviews the terms and joins -->
  <div class="plate" id="join-plate" style="display:none">
    <h2 style="font-size:20px" id="join-head"></h2>
    <div class="kv"><span class="k" id="j-type-lbl">Type</span><span class="v" id="j-type"></span></div>
    <div class="kv"><span class="k" id="j-amount-lbl">Amount</span><span class="v" id="j-amount"></span></div>
    <div class="kv"><span class="k" id="j-window-lbl">Window</span><span class="v" id="j-window"></span></div>
    <div class="kv"><span class="k" id="j-descr-lbl">Conditions</span><span class="v" id="j-descr" style="text-align:left;max-width:100%;white-space:pre-wrap;font-family:var(--body)"></span></div>
    <p class="hint" id="j-fee" style="margin-top:10px"></p>
    <div style="margin-top:16px"><button class="btn btn-kaspa" id="join-btn"></button></div>
    <p class="hint" id="join-note" style="margin-top:10px"></p>
  </div>

  <!-- PANEL -->
  <div id="panel" style="display:none">
    <div class="plate">
      <div class="timeline" id="timeline"></div>
    </div>

    <div class="plate">
      <div class="kv"><span class="k" id="s-state-lbl"></span><span class="v" id="s-state"></span></div>
      <div class="kv"><span class="k" id="s-role-lbl"></span><span class="v" id="s-role"></span></div>
      <div class="kv"><span class="k" id="s-amount-lbl"></span><span class="v" id="s-amount"></span></div>
      <div class="kv"><span class="k" id="s-type-lbl"></span><span class="v" id="s-type"></span></div>
      <div class="kv"><span class="k" id="s-addr-lbl"></span><span class="v" id="s-addr"></span></div>
      <div class="kv"><span class="k" id="s-descr-lbl"></span><span class="v" id="s-descr" style="text-align:left;max-width:100%;white-space:pre-wrap;font-family:var(--body)"></span></div>
    </div>

    <!-- disclaimer: withdrawing from the covenant is possible only after the deal closes (shown while funds are locked) -->
    <p class="hint" id="withdraw-note" style="display:none;margin:-4px 0 6px"></p>

    <!-- FUND (buyer, joined) -->
    <div class="plate" id="act-fund" style="display:none">
      <h2 style="font-size:20px" id="fund-head"></h2>
      <p class="hint" id="fund-hint"></p>
      <div id="fund-body">
        <div class="kv"><span class="k" id="f-send-lbl"></span><span class="v ok" id="f-send"></span></div>
        <label id="f-addr-lbl" style="margin-top:12px;display:block"></label>
        <div class="addr"><code id="f-addr"></code><button id="f-copy" aria-label="Copy funding address">copy</button></div>
        <div class="row wrap" style="gap:8px;margin-top:10px">
          <button class="btn btn-ghost" id="dfw-btn">Fund from my desk wallet</button>
        </div>
        <div class="qr" id="f-qr"></div>
        <div class="kv" style="margin-top:12px"><span class="k" id="f-recv-lbl"></span><span class="v" id="f-recv"></span></div>
        <div style="margin-top:14px"><button class="btn btn-kaspa" id="f-btn" disabled></button></div>
      </div>
      <div id="swap-widget" style="margin-top:16px"></div>
      <div class="note alarm" id="fund-nokey" style="display:none"></div>
    </div>

    <!-- WAIT (seller, joined) -->
    <div class="plate" id="act-wait" style="display:none"><p class="hint" id="wait-msg"></p></div>

    <!-- ACTIVE actions -->
    <div class="plate" id="act-active" style="display:none">
      <div class="kv"><span class="k" id="a-window-lbl"></span><span class="v warn" id="a-window"></span></div>
      <!-- goods: window guard — tracking sent, receipt unconfirmed, window running out → open a dispute BEFORE it closes -->
      <div class="note alarm" id="track-win-guard" style="display:none;margin-top:10px"></div>
      <p class="hint" id="a-hint"></p>
      <div id="a-buyer" style="margin-top:8px;display:none;gap:12px;flex-wrap:wrap">
        <button class="btn btn-kaspa" id="release-btn"></button>
        <button class="btn btn-alarm" id="dispute-btn"></button>
      </div>
      <div id="a-seller" style="display:none;margin-top:8px"><button class="btn btn-ghost" id="refund-btn"></button></div>
      <!-- dispute-open confirmation step: sign the dispute + reveal the chat to the arbiter in one action -->
      <div id="dispute-confirm" style="display:none;margin-top:12px">
        <p class="hint" id="dispute-confirm-note"></p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">
          <button class="btn btn-alarm" id="dispute-sign-open"></button>
          <button class="btn btn-ghost" id="dispute-cancel"></button>
        </div>
      </div>
    </div>

    <!-- DISPUTED: Phase 2 — claims → chat reveal → AI verdict → a party's signature -->
    <div class="plate" id="act-disputed" style="display:none">
      <div class="note alarm" id="disp-alarm" style="display:none;margin-bottom:12px"></div>
      <h2 style="font-size:20px" id="disp-head"></h2>
      <p class="hint" id="disp-flow"></p>
      <div class="timeline disp-steps" id="disp-steps"></div>
      <div id="disp-stage" aria-live="polite"></div>
      <div class="dl-line" id="disp-timeout" style="display:none"></div>
      <div class="note" id="settle-note" style="margin-top:16px"></div>
      <div style="margin-top:10px;display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-kaspa" id="d-release" style="display:none"></button>
        <button class="btn btn-ghost" id="d-refund" style="display:none"></button>
      </div>
    </div>

    <!-- CLOSED -->
    <div class="plate" id="act-closed" style="display:none">
      <h2 style="font-size:20px" id="closed-head"></h2>
      <p class="hint" id="closed-by"></p>
      <!-- the AI mediator's verdict shown to the parties, if the deal was closed by a dispute (arbitrated) -->
      <div id="closed-verdict" style="display:none;margin-top:12px"></div>
      <!-- payout to a party: how much came back + where it landed + withdrawal to one's own wallet (with the deal key, non-custodial) -->
      <div id="closed-payout" style="display:none;margin-top:14px">
        <!-- withdrawal form: while funds sit on the payout address -->
        <div id="cp-form">
          <div class="kv"><span class="k" id="cp-lbl"></span><span class="v ok" id="cp-amt"></span></div>
          <div class="addr" style="margin-top:8px"><code id="cp-addr"></code><button id="cp-copy" aria-label="Copy address">copy</button></div>
          <p class="hint" id="cp-hint" style="margin-top:10px"></p>
          <label id="cp-to-lbl" style="margin-top:8px;display:block"></label>
          <input type="text" id="cp-to" autocomplete="off" spellcheck="false" placeholder="kaspa:...">
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-kaspa" id="cp-withdraw"></button><button class="btn btn-ghost" id="cp-withdraw-wallet"></button></div>
          <p style="margin-top:10px"><a id="cp-explorer" target="_blank" rel="noopener" style="display:none"></a></p>
        </div>
        <!-- success: funds withdrawn + a link to the withdrawal transaction (persistent, from deal.withdraw_txid) -->
        <div id="cp-done" style="display:none">
          <p id="cp-done-msg" style="color:var(--kaspa);font-weight:600;font-size:16px;margin:0"></p>
          <p style="margin-top:8px"><a id="cp-done-tx" target="_blank" rel="noopener" style="display:none"></a></p>
        </div>
      </div>
      <p style="margin-top:10px"><a id="closed-explorer" target="_blank" rel="noopener" style="display:none"></a></p>
    </div>

    <!-- CHAT (visible after funded: funded/disputed/closed) -->
    <div class="plate" id="act-chat" style="display:none;border-color:var(--kaspa);box-shadow:0 0 0 3px rgba(0,193,175,.12)">
      <h2 style="font-size:20px" id="chat-head"></h2>
      <p class="chat-sub" id="chat-sub"></p>
      <div id="chat-funding-msg" style="display:none"></div>
      <div class="chat-note" id="chat-note" style="display:none"></div>
      <!-- read-only closed: a toggle to collapse the thread (no sending, only reading old messages/attachments) -->
      <button class="btn btn-ghost" id="chat-toggle" type="button" style="display:none;margin:8px 0"></button>
      <div id="chat-body" style="display:none">
        <div id="chat-thread" role="log" aria-live="polite"></div>
        <div id="chat-compose">
          <button class="attach-btn" id="chat-attach" type="button" style="display:none">📎</button>
          <button class="attach-btn" id="chat-track" type="button" style="display:none">📦</button>
          <button class="attach-btn" id="chat-payto" type="button" style="display:none">🏦</button>
          <button class="attach-btn" id="chat-pay" type="button" style="display:none">💸</button>
          <input type="file" id="chat-file" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/webm,application/pdf" style="display:none">
          <textarea id="chat-input" rows="2" placeholder=""></textarea>
          <button class="btn btn-kaspa" id="chat-send-btn"></button>
        </div>
        <!-- tracking-number form (seller, goods): carrier + number → an E2E track message -->
        <div id="track-form" style="display:none;margin-top:10px;padding:12px;background:var(--iron);border:1px solid var(--bd-soft);border-radius:8px">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
            <label style="flex:0 0 auto;margin:0"><span class="k" id="track-carrier-lbl" style="display:block;margin-bottom:4px"></span>
              <select id="track-carrier"></select></label>
            <label style="flex:1;min-width:180px;margin:0"><span class="k" id="track-head-lbl" style="display:block;margin-bottom:4px"></span>
              <input type="text" id="track-code" autocomplete="off" spellcheck="false"></label>
          </div>
          <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
            <button class="btn btn-kaspa" id="track-send"></button>
            <button class="btn btn-ghost" id="track-cancel"></button>
          </div>
        </div>
        <!-- OTC: counter-payment details (buyer) -->
        <div id="payto-form" style="display:none;margin-top:10px;padding:12px;background:var(--iron);border:1px solid var(--bd-soft);border-radius:8px">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
            <label style="flex:0 0 auto;margin:0"><span class="k" id="payto-method-lbl" style="display:block;margin-bottom:4px"></span>
              <select id="payto-method"></select></label>
            <label style="flex:1;min-width:180px;margin:0"><span class="k" id="payto-details-lbl" style="display:block;margin-bottom:4px"></span>
              <input type="text" id="payto-details" autocomplete="off" spellcheck="false"></label>
          </div>
          <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
            <button class="btn btn-kaspa" id="payto-send"></button>
            <button class="btn btn-ghost" id="payto-cancel"></button>
          </div>
        </div>
        <!-- OTC: payment declaration (seller) -->
        <div id="pay-form" style="display:none;margin-top:10px;padding:12px;background:var(--iron);border:1px solid var(--bd-soft);border-radius:8px">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
            <label style="flex:0 0 auto;margin:0"><span class="k" id="pay-method-lbl" style="display:block;margin-bottom:4px"></span>
              <select id="pay-method"></select></label>
            <label style="flex:1;min-width:200px;margin:0"><span class="k" id="pay-ref-lbl" style="display:block;margin-bottom:4px"></span>
              <input type="text" id="pay-ref" autocomplete="off" spellcheck="false"></label>
            <label style="flex:0 1 110px;margin:0"><span class="k" id="pay-amount-lbl" style="display:block;margin-bottom:4px"></span>
              <input type="text" id="pay-amount" autocomplete="off"></label>
            <label style="flex:0 1 90px;margin:0"><span class="k">&nbsp;</span>
              <input type="text" id="pay-currency" autocomplete="off"></label>
          </div>
          <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
            <button class="btn btn-kaspa" id="pay-send"></button>
            <button class="btn btn-ghost" id="pay-cancel"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- fresh device: no key held locally -->
    <div class="plate" id="act-key" style="display:none">
      <h2 style="font-size:20px" id="fd-head"></h2>
      <p class="hint" id="fd-hint"></p>
      <label id="fd-key-lbl"></label>
      <input type="password" id="fd-key" autocomplete="off" spellcheck="false">
      <label id="fd-token-lbl"></label>
      <input type="password" id="fd-token" autocomplete="off" spellcheck="false">
      <label id="fd-chat-lbl"></label>
      <input type="password" id="fd-chat" autocomplete="off" spellcheck="false">
      <div style="margin-top:14px"><button class="btn btn-kaspa" id="fd-btn"></button></div>
    </div>

    <!-- Telegram -->
    <div class="plate" id="tg-plate" style="display:none">
      <h2 style="font-size:20px" id="tg-head">Notifications</h2>
      <button class="btn btn-ghost" id="tg-btn"></button>
      <p class="hint" id="tg-out" style="display:none;margin-top:10px"></p>
    </div>

    <!-- Forget this deal in this browser: the key leaves with it, access remains via the recovery sheet -->
    <div id="forget-wrap" style="margin-top:18px;display:none;gap:14px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-ghost" id="forget"></button>
      <span class="hint" id="forget-hint" style="display:none"></span>
    </div>
  </div>
</div>

<footer><div class="row wrap"><a class="foot-ofs" href="https://officeforge.co" target="_blank" rel="noopener" aria-label="OfficeForge"><img src="/assets/logo.png" alt="OfficeForge"></a><span>Kaspa Escrow · non-custodial beta · <a href="https://officeforge.co">OfficeForge</a> · feedback: kaspa@officeforge.co</span></div></footer>
</div>

<script type="module">
import { boot, core, net, api, kas, usdStr, genToken, L, $, esc, copyText, qrInto, showErr, hideErr,
         templateLabel, daaLeftHuman, escrowAgeDaa, explorerAddr, explorerTx, fmtBytes, fmtClock,
         loadDeal, saveDeal, saveDeals, loadDeals, setActiveDeal, activeDealId, removeDeal, unforgetDeal, cfgStr, utxosRaw, submitTx, parseDealSheet,
         chatSupported, chatAddress, pollChat, sendChat, resetChatPoll,
         mediaSupported, checkMediaFile, encryptMediaFile, uploadMedia, downloadMedia,
         decryptMediaVerify, sendMediaMsg, parseMediaMsg,
         CARRIERS, carrierLabel, normTrackCode, looksLikeS10, s10Valid, sendTrackMsg, parseTrackMsg,
         PAY_METHODS, payMethodLabel, sendPayToMsg, sendPayMsg, parsePayToMsg, parsePayMsg,
         mutualSupported, disputeState, escalateDispute, notifyWithdrawn, sendClaim, revealChat, postMutualSig, getMutualSigs,
         parseClaim, fmtHM, splitAmounts } from '/assets/escrow.js?v=31';
import { mountSwapWidget } from '/assets/swap-widget.js?v=4';
import { requireUnlock, confirmPassword, wireCrypto } from '/assets/lock-ui.js';
import { fundTargetFromWallet } from '/assets/wallet.js';
import * as session from '/assets/session.js';

const err = $('err');
const params = new URLSearchParams(location.search);
let deal = null, cfg = null, timer = null, st = null;
// dispute-flow state (Phase 2) — before routing: startPanel synchronously calls resetDispute
let ds = null;             // the latest /dispute/state
let dispKey = '';          // key of the rendered stage
let splitInfo = null;      // {raw, toBuyer, toSeller, ok} of the current split verdict
let mutualBusy = false;    // don't run the auto-combine of a split in parallel
let revealPokeAt = 0;      // anti-spam for the repeated reveal poke
let claimReq = null;       // the outcome selected in the claim form

// static labels from the dictionary
for (const [id, key] of [
  ['s-state-lbl','lbl_status'], ['s-role-lbl','lbl_you_are'], ['s-amount-lbl','lbl_amount'],
  ['s-type-lbl','lbl_type'], ['s-addr-lbl','lbl_addr'], ['s-descr-lbl','lbl_conditions'],
  ['j-type-lbl','lbl_type'], ['j-amount-lbl','lbl_amount'], ['j-descr-lbl','lbl_conditions'],
  ['j-window-lbl','lbl_window'], ['a-window-lbl','lbl_window'],
]) $(id).textContent = L(key);

// boot → requireUnlock (the session MUST be unlocked BEFORE any profile access) → routing,
// all inside one try: loadDeals()/loadDeal() call session.getProfile(), which throws Error('locked')
// when the session isn't unlocked — without requireUnlock BEFORE routing this would crash the whole
// page (the manage.html bug). EXCEPTION — ?join=: the invite preview is public (GET /invite without
// token/profile), the profile is needed only at the Join click (key generation + write) — that's where
// joinFlow calls requireUnlock. Password AFTER the deal terms, not before (a context-free password
// wall is the main drop-off point, review 2026-07-09).
try {
  await boot();
  // routing: ?join=CODE | ?id=X | the active deal | the first one in the store
  if (params.get('join')) { await joinFlow(params.get('join')); }
  else {
    await requireUnlock(net());
    const id = params.get('id') || activeDealId() || loadDeals()[0]?.id;
    deal = id ? loadDeal(id) : null;
    if (deal) { setActiveDeal(deal.id); startPanel(); }
    else if (params.get('id')) freshDevice(Number(params.get('id')));
    else { location.href = '/desk.html'; }
  }
} catch (e) { showErr(err, e); }

// ── this browser's deal portfolio: switcher rows (by analogy with the safe portfolio) ──
function shortAddr(a) { return a ? a.slice(0, 14) + '…' + a.slice(-6) : ''; }
function dealRow(d, activeId, state) {
  const row = document.createElement('button');
  row.type = 'button';
  row.className = 'vb-item' + (d.id === activeId ? ' active' : '');
  row.innerHTML = '<span class="vb-dot"></span><span class="vb-name"></span><span class="vb-addr"></span><span class="vb-amt"></span><span class="vb-edit" title="✎">✎</span>';
  row.querySelector('.vb-name').textContent = d.label || (L('deal_title')(d.id) + ' · ' + L('noun_' + d.role));
  row.querySelector('.vb-addr').textContent = shortAddr(d.escrow_addr);
  row.querySelector('.vb-amt').textContent = kas(d.amount);
  const dot = row.querySelector('.vb-dot');   // green — active, amber — dispute, gray — closed/unknown
  if (state === 'disputed') dot.classList.add('unvaulting');
  else if (state && state !== 'closed' && state !== 'expired') dot.classList.add('vault');
  row.onclick = () => switchDeal(d.id);
  row.querySelector('.vb-edit').onclick = (e) => { e.stopPropagation(); renameDeal(d); };
  return row;
}
// Portfolio: active deals are visible right away, finished ones (closed/expired) are collapsed under
// a clickable "Finished (N)" header — so a long list doesn't sprawl. The open deal is always visible.
async function renderDealsBar() {
  const list = loadDeals();
  const bar = $('deals-bar');
  if (!list.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  $('db-title').textContent = L('deals_bar_title');
  $('db-add').textContent = L('deal_new');
  const activeId = deal ? deal.id : activeDealId();
  // states of all deals (parallel) to split them into active/finished; an error → null (shown as active)
  const states = await Promise.all(list.map(async (d) => {
    try { return (await api(`/api/safe/escrow/state?id=${d.id}&token=${encodeURIComponent(d.token)}`)).state; }
    catch { return null; }
  }));
  const wrap = $('db-list');
  wrap.innerHTML = '';
  const isDone = (i) => (states[i] === 'closed' || states[i] === 'expired') && list[i].id !== activeId;
  list.forEach((d, i) => { if (!isDone(i)) wrap.appendChild(dealRow(d, activeId, states[i])); });
  const doneIdx = list.map((_, i) => i).filter(isDone);
  if (doneIdx.length) {
    const hdr = document.createElement('button');
    hdr.type = 'button';

           chat_sk: chatSk || null, chat_pk: chatSk ? myChatPk : null,
           funding_sk: null, funding_pk: null };

  saveDeal(deal); // also marks it active

}

async function refresh() {
  if (!deal) return;   // the deal was forgotten while the tick sat in the queue (Forget)
  try {
    st = await api(`/api/safe/escrow/state?id=${deal.id}&token=${encodeURIComponent(deal.token)}`);
    if (!deal) return; // the deal was forgotten while awaiting the network — don't resurrect and don't render
    if (st.cfg) {
      cfg = st.cfg;
      // persist ONLY on a REAL change: an unconditional saveDeal every tick (6s) needlessly
      // re-encrypted the profile and resurrected a just-forgotten deal via a late tick (upsert)
      const fresh = !deal.cfg || deal.escrow_addr !== st.escrow_addr || deal.disputed_addr !== st.disputed_addr;
      deal.cfg = st.cfg; deal.escrow_addr = st.escrow_addr; deal.disputed_addr = st.disputed_addr;
      if (fresh) saveDeal(deal);
    }
    $('s-addr').textContent = st.escrow_addr || '(pending)';
    $('s-state').textContent = L('st_' + st.state) || st.state;
    $('s-state').className = 'v ' + (st.state === 'disputed' ? 'warn' : st.state === 'closed' ? '' : 'ok');
    renderTimeline(st.state);
    // action panels are switched SYNCHRONOUSLY: hide-all and show-the-right-one in a single frame,
    // NO await in between — otherwise a panel (e.g. act-closed) collapses for the duration of await
    // refreshChat and the block "jerks" on every poll, dragging the rest of the layout with it.
    for (const p of ['act-fund','act-wait','act-active','act-disputed','act-closed']) $(p).style.display = 'none';
    if (st.state === 'joined') {
      if (deal.role === 'buyer') showFund(); else { $('act-wait').style.display = 'block'; $('wait-msg').textContent = L('seller_wait'); }
    } else if (st.state === 'funded') {
      showActive();
    } else if (st.state === 'disputed') {
      showDisputed();
    } else if (st.state === 'closed' || st.state === 'expired') {
      $('act-closed').style.display = 'block';
      $('closed-head').textContent = L('closed_head');
      const kind = st.close_kind === 'resolved' ? L('closed_resolved')
                 : st.close_kind === 'arbitrated' ? L('closed_arbitrated')
                 : st.close_kind ? L('closed_by')(st.close_kind) : '';
      $('closed-by').textContent = kind;
      const ex = explorerAddr(deal.escrow_addr);
      if (ex) { $('closed-explorer').style.display = 'inline'; $('closed-explorer').href = ex; $('closed-explorer').textContent = L('view_explorer'); }
      showPayout();
      showClosedVerdict();
    }

    // "Remove the deal from this browser" is enabled only for finished (closed/expired) or not yet
    // funded (draft/joined) deals; an active funded/disputed deal must not be forgotten — the key
    // is needed for release/refund/dispute/withdrawal.
    const canForget = ['closed', 'expired', 'joined', 'draft'].includes(st.state);
    $('forget').disabled = !canForget;
    $('forget-hint').style.display = canForget ? 'none' : 'inline';
    if (!canForget) $('forget-hint').textContent = L('forget_locked');

    // disclaimer: while funds are locked in the covenant (funded/disputed) — withdrawal only after closing
    const inCovenant = st.state === 'funded' || st.state === 'disputed';
    $('withdraw-note').style.display = inCovenant ? 'block' : 'none';
    if (inCovenant) $('withdraw-note').textContent = L('withdraw_after_close');
    if (st.state !== 'funded') disputeConfirm = false;   // the dispute confirmation step lives only in active

    // chat plate: after funded (funded/disputed/closed), §3 "always chat (after funded)"; in joined —
    // a hint that the chat opens after funding. AFTER the panel switch — its network awaits
    // must not leave the action panel hidden for a frame (see the comment above).
    await refreshChat(st.state);
  } catch (e) { /* transient */ }
}

let tlKey = null;
function renderTimeline(state) {
  const steps = ['joined', 'funded', state === 'disputed' ? 'disputed' : 'closed'];
  const order = { draft: 0, joined: 1, funded: 2, disputed: 3, closed: 3, expired: 3 };
  const cur = order[state] ?? 0;
  const key = steps.join(',') + '|' + cur;   // rendering depends only on the steps and the current index
  if (tlKey === key) return;                 // timeline unchanged — don't rebuild the DOM (it would flicker on every poll)
  tlKey = key;
  $('timeline').innerHTML = steps
    .map((s) => `<div class="tl ${order[s] <= cur ? 'on' : ''} ${s === 'disputed' ? 'warn' : ''}"><span class="tl-dot"></span><span class="tl-lbl">${esc(L('st_' + s))}</span></div>`)
    .join('<div class="tl-bar"></div>');
}

// FUND (buyer)
let fundRaw = '[]';
let fundLocking = false;   // the lock transaction is being sent (guard against races/double sends)
let fundAutoDone = false;  // auto-lock was already attempted for this deal — retry only manually via the button
let swapMounted = false;   // the SimpleSwap fund-in widget mounts once per deal
// The buyer funds the DEAL AMOUNT + the base fee (feeResolve): on release the seller receives
// exactly the amount (fee on top). Under arbitration the higher feeDispute is deducted from the total.
function fundTargetSompi() { return deal.amount + ((cfg && cfg.fee_resolve) || 0); }
function showFund() {
  $('act-fund').style.display = 'block';
  $('fund-head').textContent = L('fund_head');
  if (!deal.funding_pk || !deal.funding_sk) {
    // a fresh device without the funding key: the address can't be reconstructed (the pk is stored only locally)
    $('fund-body').style.display = 'none';
    $('fund-hint').textContent = '';

  $('f-recv-lbl').textContent = L('fund_recv');
  if (!$('f-recv').textContent) $('f-recv').textContent = L('fund_wait');
  const fundTarget = fundTargetSompi();
  $('f-send-lbl').textContent = L('fund_send_lbl');
  $('f-send').textContent = kas(fundTarget) + usdStr(fundTarget);
  // the button is a manual fallback; while waiting for funds we show that locking will happen by itself
  if (!fundLocking && !fundAutoDone) { $('f-btn').textContent = L('lock_auto'); $('f-btn').disabled = true; }
  const fundAddr = core.pubkey_to_address(deal.funding_pk, net());
  $('f-addr').textContent = fundAddr;
  qrInto($('f-qr'), `kaspa:${fundAddr.replace(/^kaspa:/,'')}?amount=${(fundTarget/1e8)}`);
  pollFunding(fundAddr);
  // The amount is known from the deal — no input field (owner feedback 2026-07-09): send exactly what's missing.
  $('dfw-btn').onclick = async () => {
    const w = session.getProfile().wallet;
    if (!w) { alert('No wallet in this profile'); return; }
    $('dfw-btn').disabled = true;
    try {
      let received = 0;
      try { received = JSON.parse(await utxosRaw(fundAddr)).reduce((s, u) => s + u.amount, 0); } catch {}
      const needed = fundTargetSompi() - received;
      if (needed <= 0) { alert('The funding address already holds enough — locking will happen automatically.'); return; }
      const bal = JSON.parse(await utxosRaw(w.addr)).reduce((s, u) => s + u.amount, 0);
      // +0.2 KAS margin: the wallet fee + anti-KIP9 (micro change yields an exorbitant storage mass)
      if (bal < needed + 20000000) { alert(`Not enough funds in the wallet: ${kas(needed)} needed (+ ~0.2 KAS fee margin), ${kas(bal)} available.`); return; }
      if (!await confirmPassword('Funding the escrow from the desk wallet.', {
        context: `<b style="font-family:var(--mono);color:var(--kaspa)">${kas(needed)}</b> → escrow of deal #${esc(deal.id)}` })) return;
      await fundTargetFromWallet(w, fundAddr, needed, net());
    } catch (e) { alert((e && e.message) || 'Error'); }
    $('dfw-btn').disabled = false;
  };
  if (!swapMounted) {
    swapMounted = true;
    // minKas: the swap must cover the funding in full; the excess returns to the wallet (skimming below)
    mountSwapWidget({ container: $('swap-widget'), api, kas, kind: 'escrow', target: String(deal.id),
      token: deal.token, fundAddr, lang: document.documentElement.lang, minKas: fundTargetSompi() / 1e8 });
  }
}
copyText($('f-copy'), () => $('f-addr').textContent);
// Excess skimming (owner feedback 2026-07-09): build_escrow_fund takes the ENTIRE balance of the
// funding address into the covenant — without skimming a swap overpayment would go to the seller
// on release. Before locking, the excess over the target (+a buffer for the skim's own fee) is sent
// to the profile wallet; small change (< 0.5 KAS) is not skimmed — it goes into the covenant as a non-critical extra.
const SKIM_MIN = 50000000;    // 0.5 KAS
const SKIM_BUFFER = 10000000; // 0.1 KAS stays above the target — covers the skim's own fee
let skimDone = false;
async function pollFunding(fundAddr) {
  try {
    fundRaw = await utxosRaw(fundAddr);
    const sum = JSON.parse(fundRaw).reduce((s, u) => s + u.amount, 0);
    if (sum > 0) { $('f-recv').textContent = kas(sum); $('f-recv').className = 'v ok'; }
    if (fundLocking) return;                          // locking is already underway — don't touch the button
    if (sum >= fundTargetSompi()) {                   // enough funds (amount + base fee) → lock automatically (once)
      if (fundAutoDone) return;
      const excess = sum - fundTargetSompi() - SKIM_BUFFER;
      const w = (() => { try { return session.getProfile().wallet; } catch { return null; } })();
      if (!skimDone && excess > SKIM_MIN && w && deal.funding_sk) {
        skimDone = true; // a single attempt: if it fails — fund as is
        try {
          const built = core.build_split(deal.funding_sk, w.addr, String(excess), fundRaw, net());
          await submitTx(built);
          return; // the excess went to the wallet; the next poll sees ~the target on funding and locks
        } catch { /* skim failed — don't block the deal, the excess goes into the covenant */ }
      }
      fundAutoDone = true;
      lockEscrow();
      return;
    }
    $('f-btn').disabled = true;                       // waiting for funds (the fallback button is inactive)
  } catch {}
}
// Lock funds into escrow (build_escrow_fund + submit). Called AUTOMATICALLY from pollFunding when
// the balance suffices; the f-btn button is a manual fallback in case the auto-lock fails.
async function lockEscrow() {
  if (fundLocking) return;
  fundLocking = true;
  hideErr(err);
  $('f-btn').disabled = true; $('f-btn').textContent = L('locking');
  try {
    const built = core.build_escrow_fund(cfgStr(cfg), deal.funding_sk, fundRaw, net());
    await submitTx(built);
    refresh();                                        // → funded, the funding screen goes away
  } catch (e) {
    fundLocking = false;                              // allow a manual retry via the button
    showErr(err, e);
    $('f-btn').disabled = false; $('f-btn').textContent = L('lock_btn');
  }
}
$('f-btn').onclick = () => lockEscrow();

let withdrawBusy = false;
async function showPayout() {

// The AI mediator's verdict in the closed-deal block: if a dispute closed the deal (arbitrated) and a

  let ds;
  try { ds = await disputeState(deal); } catch { return; }  // network — retry on the next tick

      `<div class="verdict-card"><div class="vc-eyebrow">${esc(L('disp_verdict_head'))}</div>` +
      `<div class="vc-outcome">${esc(outcome)}</div>` +
      `<div class="vc-reason"><span class="vc-rh">${esc(L('disp_reason_head'))}</span>${esc(v.reason || '')}</div></div>`;
  }

    const ad = arb.outcome === 'buyer' ? L('arb_done_buyer')
             : arb.outcome === 'seller' ? L('arb_done_seller')
             : L('arb_done_split')(Number(arb.pct) || 0);

      `<div class="verdict-card" style="margin-top:10px;border-color:var(--kaspa)"><div class="vc-eyebrow">${esc(L('arb_done_head'))}</div>` +
      `<div class="vc-outcome">${esc(ad)}</div></div>`;

// ── DISPUTE FLOW (Phase 2): the stage is derived from /dispute/state; the stage's DOM is rebuilt
// ONLY when it changes (form input isn't wiped by polling), the dynamics update every tick ──
function resetDispute() { ds = null; dispKey = ''; splitInfo = null; mutualBusy = false; revealPokeAt = 0; claimReq = null; }

let dispUtxoDaa = null;   // the DAA moment the dispute opened (disputed-utxo creation) — cached, doesn't change
/** The contract's emergency circuit: time left until timeout (sec) from on-chain data. null = can't compute. */
async function timeoutLeftSecs() {
  try {
    if (dispUtxoDaa == null) {
      const u = JSON.parse(await utxosRaw(deal.disputed_addr)).find((x) => x.covenant_id);
      if (!u) return null;                       // the dispute has already been executed
      dispUtxoDaa = u.daa;
    }
    const info = await api('/api/safe/info');
    if (!info.virtual_daa) return null;
    return Math.floor((cfg.arbiter_deadline - (info.virtual_daa - dispUtxoDaa)) / 10);
  } catch { return null; }
}
async function updateDispTimeout() {
  const el = $('disp-timeout');
  const left = cfg && cfg.arbiter_deadline ? await timeoutLeftSecs() : null;
  if (left == null) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.className = 'dl-line' + (left < 6 * 3600 ? ' red' : '');
  const side = L(cfg.timeout_to === 1 ? 'disp_timeout_seller' : 'disp_timeout_buyer');
  el.innerHTML = left > 0
    ? `⛑ ${esc(L('disp_timeout_line')(fmtHM(left), side)).replace(esc(fmtHM(left)), `<span class="mono">${esc(fmtHM(left))}</span>`)}`
    : `⛑ ${esc(L('disp_timeout_soon'))}`;
}

async function refreshDispute() {
  try { ds = await disputeState(deal); } catch { return; }
  updateDispTimeout();
  // mutual settlement (release/refund) and its hint hide after escalation — from there the human arbiter decides
  const escalated = !!ds.escalated;
  $('d-release').style.display = (!escalated && deal.role === 'buyer') ? 'inline-flex' : 'none';
  $('d-refund').style.display = (!escalated && deal.role === 'seller') ? 'inline-flex' : 'none';
  $('settle-note').style.display = escalated ? 'none' : 'block';
  const stage = dispStage();
  renderDispSteps(stage);
  const box = $('disp-stage');
  if (dispKey !== stage) { dispKey = stage; splitInfo = null; buildStage(box, stage); }
  await updateStage(box, stage);
}

// resolution stage: claim → waiting → reveal → verdict/split → escalation
function dispStage() {
  if (!ds) return 'none';
  if (ds.escalated) return 'escalated';
  if (ds.verdict && ds.verdict.outcome) return ds.verdict.outcome === 'split' ? 'split' : 'verdict';
  if (!ds.my_claim) return 'claim';
  if (!ds.both_claims) return 'waitclaim';
  return (ds.revealed && ds.revealed[deal.role]) ? 'waitverdict' : 'reveal';
}

let dispStepsKey = null;
function renderDispSteps(stage) {
  const idx = { claim: 0, waitclaim: 0, reveal: 1, waitverdict: 1, verdict: 2, split: 2, escalated: 3 }[stage] ?? 0;
  const esct = stage === 'escalated';
  const key = idx + '|' + esct;              // the steps depend only on the index and the escalation flag
  if (dispStepsKey === key) return;          // stage unchanged — don't rebuild the DOM (it would flicker on every poll)
  dispStepsKey = key;
  const lbls = [L('disp_step_claims'), L('disp_step_reveal'), L('disp_step_verdict'), esct ? L('disp_step_human') : L('disp_step_sign')];
  $('disp-steps').innerHTML = lbls.map((s, i) =>
    `<div class="tl ${i <= idx ? 'on' : ''}${esct && i === 3 ? ' warn' : ''}"><span class="tl-dot"></span><span class="tl-lbl">${esc(s)}</span></div>`
  ).join('<div class="tl-bar"></div>');
}

const reqIcon = { refund: '↩', release: '→', split: '⚖' };

function myClaimQuote() {
  const c = parseClaim(ds.my_claim);

         `${c.reason ? `<div class="dq-text">${esc(c.reason)}</div>` : ''}</div>`;

function revMarks() {

  return { y: ds.revealed && ds.revealed[deal.role] ? '✓' : '—', p: ds.revealed && ds.revealed[peer] ? '✓' : '—' };

function buildStage(box, stage) {
  if (stage === 'claim') {
    claimReq = null;

      `<label style="margin-top:14px;display:block;color:var(--kaspa);font-weight:600;font-size:14px">${esc(L('disp_claim_q'))}</label>` +

    };

      try {
        hideErr(err);
        $('claim-send').disabled = true; $('claim-send').textContent = L('disp_claim_sending');
        await sendClaim(deal, claimReq, $('claim-reason').value.trim());

    };
  } else if (stage === 'waitclaim') {

      (v && v.outcome
        ? `<div class="verdict-card"><div class="vc-eyebrow">${esc(L('disp_verdict_head'))} · ${esc(L('disp_rejected_tag'))}</div>` +
          `<div class="vc-outcome">${esc(v.outcome === 'refund' ? L('disp_out_refund') : v.outcome === 'release' ? L('disp_out_release') : L('disp_out_split')(Number(v.pct) || 0))}</div>` +
          `<div class="vc-reason"><span class="vc-rh">${esc(L('disp_reason_head'))}</span>${esc(v.reason || '')}</div></div>`
        : '');
  } else {
    box.innerHTML = '';
  }
}

// per-tick dynamics: countdown, reveal status, the verdict poke, mutual-signature exchange
async function updateStage(box, stage) {
  const t = box.querySelector('.vc-time');
  if (t) {
    const left = ds.verdict_window_left_secs || 0;
    t.textContent = left > 0 ? L('disp_window')(fmtHM(left)) : L('disp_window_over');
  }
  const rs = box.querySelector('#disp-revst');
  if (rs) { const m = revMarks(); rs.textContent = L('disp_reveal_status')(m.y, m.p); }
  // the server issues the verdict only INSIDE a reveal request; if I revealed before the second
  // claim — repeat the reveal (idempotent, same key) once both claims are ready
  if (stage === 'waitverdict' && deal.chat_sk && Date.now() - revealPokeAt > 20000) {
    revealPokeAt = Date.now();
    try { await revealChat(deal); } catch {}
  }
  if (stage === 'split') await updateSplit(box);
}

async function updateSplit(box) {
  const act = box.querySelector('#split-act');
  if (!act) return;
  if (!splitInfo) {
    try { splitInfo = await splitAmounts(deal, Number(ds.verdict.pct)); }
    catch { return; }  // no disputed UTXO (the deal is closing) — refresh() will switch the panel
    box.querySelector('#split-amounts').innerHTML =
      `<span><i class="dot dot-b"></i>${esc(L('disp_amount_buyer'))} <b>${esc(kas(splitInfo.toBuyer))}</b></span>` +
      `<span><i class="dot dot-s"></i>${esc(L('disp_amount_seller'))} <b>${esc(kas(splitInfo.toSeller))}</b></span>`;
    if (!splitInfo.ok) act.innerHTML = `<div class="chat-note">${esc(L('disp_split_too_small'))}</div>`;
    else if (mutualSupported()) act.innerHTML = `<button class="btn btn-kaspa" id="split-sign">${esc(L('disp_accept_sign'))}</button>`;
    const ssb = $('split-sign');
    if (ssb) ssb.onclick = async () => {
      if (!confirm(L('disp_confirm_split')(kas(splitInfo.toBuyer), kas(splitInfo.toSeller)))) return;
      if (!await confirmPassword('Sign mutual settlement')) return;
      try {
        hideErr(err);
        ssb.disabled = true; ssb.textContent = L('disp_signing');
        const sig = JSON.parse(core.escrow_mutual_sig(cfgStr(cfg), splitInfo.raw, String(splitInfo.toBuyer), deal.sk)).sig;
        await postMutualSig(deal, sig);
        await refreshDispute();
      } catch (e) { showErr(err, e); const b = $('split-sign'); if (b) { b.disabled = false; b.textContent = L('disp_accept_sign'); } }
    };
  }
  if (!splitInfo.ok) return;
  let sigs;
  try { sigs = await getMutualSigs(deal); } catch { return; }
  const mySig = deal.role === 'buyer' ? sigs.buyer_sig : sigs.seller_sig;
  if (sigs.buyer_sig && sigs.seller_sig) {
    if (mutualBusy) return;
    mutualBusy = true;
    act.innerHTML = `<p class="hint">${esc(L('disp_split_closing'))}</p>`;
    try {
      const raw = await utxosRaw(deal.disputed_addr);  // a fresh UTXO: the outpoint is the same until someone spends it
      const t2 = JSON.parse(core.escrow_mutual_combine(cfgStr(cfg), raw, String(splitInfo.toBuyer), sigs.buyer_sig, sigs.seller_sig));
      await submitTx(JSON.stringify({ tx: t2.tx }));
    } catch { /* the other side may have submitted first — the watcher will see the closing */ }
    refresh();
  } else if (mySig && !act.querySelector('.split-waiting')) {
    act.innerHTML = `<p class="hint split-waiting">${esc(L('disp_split_wait_peer'))}</p>`;
  }
}

// ── CHAT ──
const renderedMsgs = new Set();   // bubble dedup by msg.id (§11.3)
let chatReadTimer = null;         // debounce of the deal.chatRead persist (the desk's unread badge)
let hasTrackInThread = false;     // the thread contains a track message (for the goods window guard)
let chatFunded = false;

let chatCollapsed = true;   // the closed deal's read-only chat: collapsed; the user expands it to read old messages/attachments
$('chat-toggle').onclick = () => { chatCollapsed = !chatCollapsed; if (st) refreshChat(st.state); };
async function refreshChat(state) {
  const plate = $('act-chat');
  if (state === 'joined') {
    // before funding: show a plate with an explanation instead of a silently missing chat
    plate.style.display = 'block';
    $('chat-note').style.display = 'block';
    $('chat-note').textContent = L('chat_after_fund');
    $('chat-funding-msg').style.display = 'none';
    $('chat-body').style.display = 'none';
    return;
  }
  if (!['funded', 'disputed', 'closed', 'expired'].includes(state)) { plate.style.display = 'none'; return; }
  plate.style.display = 'block';
  const myChatOk = chatSupported() && deal.chat_sk && deal.chat_pk;
  peerChatPk = (st.my_role || deal.role) === 'buyer' ? st.seller_chat_pk : st.buyer_chat_pk;
  if (!myChatOk) {
    $('chat-note').style.display = 'block';
    $('chat-note').textContent = L('chat_unavailable');
    $('chat-funding-msg').style.display = 'none';
    $('chat-body').style.display = 'none';
    return;
  }
  if (!peerChatPk) {
    $('chat-note').style.display = 'block';
    $('chat-note').textContent = L('chat_peer_missing');
    $('chat-funding-msg').style.display = 'none';
    $('chat-body').style.display = 'none';
    return;
  }
  $('chat-note').style.display = 'none';
  // chat-key funding: while the address has no UTXO — sending is impossible
  if (!chatFunded) {
    try { chatFunded = JSON.parse(await utxosRaw(chatAddress(deal.chat_pk))).length > 0; } catch {}
  }
  const over = st.state === 'closed' || st.state === 'expired';
  $('chat-funding-msg').style.display = (chatFunded || over) ? 'none' : 'block';
  $('chat-funding-msg').textContent = L('chat_funding');
  if (over) {
    // the deal is closed: read-only chat — remove sending, collapse the thread (expandable via the button)
    $('chat-compose').style.display = 'none';
    $('chat-attach').style.display = 'none';
    $('chat-track').style.display = 'none';
    $('track-form').style.display = 'none';
    $('chat-payto').style.display = $('chat-pay').style.display = 'none';
    $('payto-form').style.display = $('pay-form').style.display = 'none';
    $('chat-toggle').style.display = 'block';
    $('chat-toggle').textContent = chatCollapsed ? L('chat_expand') : L('chat_collapse');
    $('chat-sub').textContent = L('chat_readonly');
    $('chat-body').style.display = chatCollapsed ? 'none' : 'block';
  } else {
    chatCollapsed = true;                       // reset before closing, so after closing the chat starts collapsed
    $('chat-toggle').style.display = 'none';
    $('chat-body').style.display = 'block';
    $('chat-compose').style.display = chatFunded ? 'flex' : 'none';
    $('chat-attach').style.display = mediaSupported() ? 'inline-flex' : 'none';
    // tracking number: only the seller in a goods deal (spec KASPA-ESCROW-TRACKING.md)
    $('chat-track').style.display = (chatFunded && deal.role === 'seller' && deal.template === 'goods') ? 'inline-flex' : 'none';
    // OTC (spec KASPA-ESCROW-OTC.md): payment details — the buyer, "I have paid" — the seller
    $('chat-payto').style.display = (chatFunded && deal.role === 'buyer' && deal.template === 'otc') ? 'inline-flex' : 'none';
    $('chat-pay').style.display = (chatFunded && deal.role === 'seller' && deal.template === 'otc') ? 'inline-flex' : 'none';
  }
  await pollChat(deal, renderChatMsg);
}

function threadEl() { return $('chat-thread'); }
function nearBottom(el) { return el.scrollHeight - el.scrollTop - el.clientHeight < 90; }
function autoScroll(el, force) { if (force || nearBottom(el)) el.scrollTop = el.scrollHeight; }
function metaHtml(m) {
  const t = m.ts ? esc(fmtClock(m.ts)) : '';
  if (!m.txid) return t;
  const short = esc(m.txid.slice(0, 8));
  const ex = explorerTx(m.txid);
  const title = esc(L('anchor_title'));
  const a = ex ? `<a class="anchor" href="${ex}" target="_blank" rel="noopener" title="${title}" aria-label="${title}">⛓ ${short}</a>`
               : `<span class="anchor" title="${title}">⛓ ${short}</span>`;
  return `${a}${t ? ' · ' + t : ''}`;
}

/** Render one message (text or media). Called ONLY from pollChat — once per id. */
function renderChatMsg(m) {
  const thread = threadEl();
  if (m.id != null) {
    if (renderedMsgs.has(m.id)) return;
    renderedMsgs.add(m.id);
    // the read mark for the desk badge (the deal page is open = the chat is in view);
    // debounce: one rewrite of the encrypted profile per batch of messages, not per message
    if (m.id > (deal.chatRead || 0)) {
      deal.chatRead = m.id;
      clearTimeout(chatReadTimer);
      chatReadTimer = setTimeout(() => { try { saveDeal(deal); } catch { /* profile locked */ } }, 1500);
    }
  }
  const empty = thread.querySelector('.chat-empty');
  if (empty) empty.remove();
  const wasBottom = nearBottom(thread);
  const media = m.text != null ? parseMediaMsg(m.text) : null;
  const track = m.text != null ? parseTrackMsg(m.text) : null;
  const payto = m.text != null ? parsePayToMsg(m.text) : null;
  const pay = m.text != null ? parsePayMsg(m.text) : null;
  const div = document.createElement('div');
  if (track) {
    div.className = 'msg media ' + (m.mine ? 'mine' : 'their');
    renderTrackBody(div, track, m);
    hasTrackInThread = true;
  } else if (payto) {
    div.className = 'msg media ' + (m.mine ? 'mine' : 'their');
    renderPayToBody(div, payto, m);
  } else if (pay) {
    div.className = 'msg media ' + (m.mine ? 'mine' : 'their');
    renderPayBody(div, pay, m);
  } else if (media) {
    div.className = 'msg media ' + (m.mine ? 'mine' : 'their');
    renderMediaBody(div, media, m);
  } else {
    div.className = 'msg ' + (m.mine ? 'mine' : 'their') + (m.text == null ? ' err' : '');
    div.innerHTML = `<div class="msg-text">${m.text == null ? esc(L('decrypt_err')) : esc(m.text)}</div><div class="msg-meta">${metaHtml(m)}</div>`;
  }
  thread.appendChild(div);
  autoScroll(thread, wasBottom);
}

/** Media bubble: header (type/name/size) + lazy download → decryption → hash check → display. */
function renderMediaBody(div, media, m) {
  const ico = media.kind === 'img' ? '🖼️' : media.kind === 'vid' ? '🎬' : '📄';
  const kindLbl = media.kind === 'img' ? L('m_photo') : media.kind === 'vid' ? L('m_video') : L('m_doc');
  div.innerHTML =
    `<div class="m-head"><span class="m-ico" aria-hidden="true">${ico}</span>` +
    `<span class="m-name">${esc(media.name)}</span><span class="m-size">${esc(fmtBytes(media.size))}</span></div>` +
    `<div class="m-cap">🔒 ${esc(L('m_sent_meta'))}</div>` +
    `<div class="m-act"><button class="m-btn m-load">${esc(L('m_load')(kindLbl))}</button></div>` +
    `<div class="mprog" style="display:none"><i></i></div>` +
    `<div class="m-view"></div>` +
    `<div class="msg-meta">${metaHtml(m)}</div>`;
  const loadBtn = div.querySelector('.m-load');
  const prog = div.querySelector('.mprog');
  const bar = prog.querySelector('i');
  const view = div.querySelector('.m-view');
  const cap = div.querySelector('.m-cap');
  loadBtn.onclick = async () => {
    loadBtn.disabled = true;
    prog.style.display = 'block';
    try {
      loadBtn.textContent = L('m_downloading')(0);
      const blob = await downloadMedia(deal, media.media_id, (p) => { bar.style.width = p + '%'; loadBtn.textContent = L('m_downloading')(p); });
      loadBtn.textContent = L('m_decrypting');
      await new Promise((r) => setTimeout(r, 30)); // yield a frame for the repaint
      const pt = decryptMediaVerify(media.k, media.sha, blob);
      prog.style.display = 'none';
      loadBtn.parentElement.style.display = 'none';
      cap.className = 'm-cap ok';
      cap.textContent = '✓ ' + L('m_hash_ok');
      showMedia(view, media, pt);
    } catch (e) {
      prog.style.display = 'none';
      loadBtn.disabled = false;
      loadBtn.textContent = L('m_retry');
      cap.className = 'm-cap bad';
      cap.textContent = '⚠ ' + (e.message || e);
    }
  };
}

function showMedia(view, media, pt) {
  const blob = new Blob([pt], { type: media.kind ? media.mime : 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  if (media.kind === 'img') {
    view.innerHTML = `<a href="${url}" target="_blank" rel="noopener"><img alt="${esc(media.name)}"></a>`;
    view.querySelector('img').src = url;
  } else if (media.kind === 'vid') {
    view.innerHTML = `<video controls preload="metadata" playsinline></video>`;
    view.querySelector('video').src = url;
  } else if (media.kind === 'doc') {
    // PDF: open the decrypted blob in a new tab (+ the shared "Save" button below)
    view.innerHTML = `<div class="m-act"><a class="m-btn" href="${url}" target="_blank" rel="noopener">📄 ${esc(L('m_open'))}</a></div>`;
  }
  const act = document.createElement('div');
  act.className = 'm-act';
  const dl = document.createElement('a');
  dl.className = 'm-btn'; dl.href = url; dl.download = media.name; dl.textContent = L('m_save');
  act.appendChild(dl);
  view.appendChild(act);
}

  hideErr(err);
  let kindLbl;
  try { const kind = checkMediaFile(file); kindLbl = kind === 'img' ? L('m_photo') : kind === 'vid' ? L('m_video') : L('m_doc'); }
  catch (e) { showErr(err, e); return; }

  // a temporary progress bubble: NOT a message render (polling will show it), only an indicator
  const thread = threadEl();
  const tmp = document.createElement('div');
  tmp.className = 'msg media mine';
  tmp.innerHTML =
    `<div class="m-head"><span class="m-ico" aria-hidden="true">${file.type.startsWith('image/') ? '🖼️' : file.type.startsWith('video/') ? '🎬' : '📄'}</span>` +
    `<span class="m-name">${esc(file.name)}</span><span class="m-size">${esc(fmtBytes(file.size))}</span></div>` +
    `<div class="m-cap">${esc(L('m_encrypting'))}</div>` +

    if (!cancelled) {
      cap.className = 'm-cap bad';

      const act = tmp.querySelector('.m-act');
      act.innerHTML = `<button class="m-btn">${esc(L('m_dismiss'))}</button>`;
      act.querySelector('button').onclick = () => tmp.remove();

  $('pay-currency').value = 'USDT';
  $('pay-send').textContent = L('pay_send');
  $('pay-cancel').textContent = L('track_cancel');
  $('chat-pay').title = L('pay_btn_title');
  $('chat-pay').setAttribute('aria-label', L('pay_btn_title'));
}
$('chat-payto').onclick = () => {
  const f = $('payto-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  if (f.style.display === 'block') $('payto-details').focus();
};
$('payto-cancel').onclick = () => { $('payto-form').style.display = 'none'; };
$('payto-send').onclick = async () => {
  if (!peerChatPk || !deal.chat_sk) return;
  hideErr(err);
  const details = $('payto-details').value.trim();
  if (details.length < 5) { showErr(err, new Error(L('payto_details_ph'))); return; }
  const btn = $('payto-send');
  try {
    btn.disabled = true; btn.textContent = L('chat_sending');
    await sendPayToMsg(deal, peerChatPk, $('payto-method').value, details);
    $('payto-details').value = '';
    $('payto-form').style.display = 'none';
    await pollChat(deal, renderChatMsg);
    autoScroll(threadEl(), true);
  } catch (e) { showErr(err, e); }
  finally { btn.disabled = false; btn.textContent = L('payto_send'); }
};
$('chat-pay').onclick = () => {
  const f = $('pay-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  if (f.style.display === 'block') $('pay-ref').focus();
};
$('pay-cancel').onclick = () => { $('pay-form').style.display = 'none'; };
$('pay-send').onclick = async () => {
  if (!peerChatPk || !deal.chat_sk) return;
  hideErr(err);
  const ref = $('pay-ref').value.trim();
  const amount = $('pay-amount').value.trim();
  if (ref.length < 5 || ref.length > 100 || !amount) { showErr(err, new Error(L('pay_bad_fields'))); return; }
  const btn = $('pay-send');
  try {
    btn.disabled = true; btn.textContent = L('chat_sending');
    await sendPayMsg(deal, peerChatPk, $('pay-method').value, ref, amount, $('pay-currency').value.trim());
    $('pay-ref').value = ''; $('pay-amount').value = '';
    $('pay-form').style.display = 'none';
    await pollChat(deal, renderChatMsg);
    autoScroll(threadEl(), true);
  } catch (e) { showErr(err, e); }
  finally { btn.disabled = false; btn.textContent = L('pay_send'); }
};

$('track-send').onclick = async () => {
  if (!peerChatPk || !deal.chat_sk) return;
  hideErr(err);
  const code = normTrackCode($('track-code').value);
  if (!code) { showErr(err, new Error(L('track_bad_code'))); return; }
  // S10 format with a broken checksum — warn (don't block: carrier-specific formats are legitimate)
  if (looksLikeS10(code) && !s10Valid(code) && !confirm(L('track_s10_fail'))) return;
  const btn = $('track-send');
  try {
    btn.disabled = true; btn.textContent = L('chat_sending');
    await sendTrackMsg(deal, peerChatPk, $('track-carrier').value, code);
    $('track-code').value = '';
    $('track-form').style.display = 'none';
    await pollChat(deal, renderChatMsg);
    autoScroll(threadEl(), true);
  } catch (e) { showErr(err, e); }
  finally { btn.disabled = false; btn.textContent = L('track_send'); }
};

$('tg-btn').onclick = async () => {
  try {
    const r = await api(`/api/safe/escrow/tg-code?id=${deal.id}&token=${encodeURIComponent(deal.token)}`);
    $('tg-out').style.display = 'block';
    $('tg-out').innerHTML = r.bot ? L('tg_hint')(esc(r.bot), esc(r.code)) : `Code: ${esc(r.code)} (bot soon)`;
  } catch (e) { showErr(err, e); }
};

// forget the deal in this browser: the key leaves with it — warn about the recovery sheet
$('forget').onclick = () => {
  if (!deal) return;
  if (st && (st.state === 'funded' || st.state === 'disputed')) return; // safety net: never forget an active deal (the button is disabled anyway)
  if (!confirm(L('forget_deal_confirm'))) return;
  // background writers — STOP before removal: a refresh() tick / chatRead debounce arriving after
  // removeDeal used to resurrect the deal via a saveDeal upsert (second safety net — the tombstone in escrow.js)
  if (timer) { clearInterval(timer); timer = null; }
  clearTimeout(chatReadTimer);
  removeDeal(deal.id);
  deal = null;
  location.href = location.pathname; // a reload without ?id → opens the active/first deal or an empty state
};
</script>
<script>if("serviceWorker" in navigator&&/(^|\.)kaspaforge\.org$|(^|\.)officeforge\.co$/.test(location.hostname))navigator.serviceWorker.register("/sw-escrow.js");</script>
<script src="/assets/kaspa-widget.js?v=3" defer></script>
